  <h4>Kategória választás</h4>
<mat-form-field>
  <mat-label>Kategóriák</mat-label>
  <mat-select>
    @for (cat of categories; track cat) {
      <mat-option [value]="cat.value">{{cat.viewValue}}</mat-option>
    }
  </mat-select>
</mat-form-field>

 <a  (click)="Teszt()" mat-raised-button type="submit">Add</a>

<div class="container mt-4">
  <div class="row">

    <div class="col-12 col-md-6 col-lg-4 mb-4" *ngFor="let categories of services">
      <mat-card>
        <mat-card-title class="text-center mt-1">{{ cat.cat_id }}</mat-card-title>
        <mat-card-content>
        <p>{{ cat.cat_name }}</p>
        <p>{{ cat.valid }}</p>
         <p><strong>Kategória:</strong> {{ serv.cat_name }}</p>
          <p><strong>Felhasználó:</strong> {{ serv.user_name }}</p>
          <p><strong>Kezdete:</strong> {{ serv.serv_start }}</p>
          <p><strong>Vége:</strong> {{ serv.serv_end }}</p>
          <p><strong>Ár:</strong> {{ serv.cost }} Ft</p>
      
        </mat-card-content>
      </mat-card>
    </div>

  </div>
</div>
