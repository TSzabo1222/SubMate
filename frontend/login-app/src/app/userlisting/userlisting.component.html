<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  


<div class="mat-elevation-z8">
  <table mat-table matSort [dataSource]="dataSource">

    <!-- Username Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Felhasználónév </th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="u_name">
      <th mat-header-cell mat-sort-header *matHeaderCellDef> Név </th>
      <td mat-cell *matCellDef="let element"> {{element.u_name}} </td>
    </ng-container>

    <!-- Email Column -->
    <ng-container matColumnDef="email">
      <th mat-header-cell mat-sort-header *matHeaderCellDef> Email </th>
      <td mat-cell *matCellDef="let element"> {{element.email}} </td>
    </ng-container>

    <!-- Role Column -->
    <ng-container matColumnDef="u_role">
      <th mat-header-cell mat-sort-header *matHeaderCellDef> Jogosultság </th>
      <td mat-cell *matCellDef="let element"> {{element.u_role===''?'Nincs hozzárendelve':element.u_role}} </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell mat-sort-header *matHeaderCellDef> Állapot </th>
      <td mat-cell *matCellDef="let element"> {{element.isactive===1 || element.isactive===true ?'Aktív':'Inaktív'}} </td>
    </ng-container>

    <!-- Action Column -->
    <ng-container matColumnDef="action">
      <th mat-header-cell mat-sort-header *matHeaderCellDef> Művelet </th>
      <td mat-cell *matCellDef="let element">
        <a *ngIf="element.u_role!='admin'" (click)="UpdateUser(element.id)" mat-raised-button type="submit">Frissítés</a>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Select page of periodic elements">
  </mat-paginator>
</div>

</body>
</html>
