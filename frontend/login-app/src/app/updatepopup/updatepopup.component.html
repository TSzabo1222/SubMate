<mat-card>
  <mat-card-title>
    <h3>Felhasználó Frissítés</h3>
  </mat-card-title>
    <mat-card-content>

      <form class="example-form" [formGroup]="registerForm" (ngSubmit)="UpdateUser()">
        
        <mat-form-field class="example-full-width">
          <mat-label>Jogosultság</mat-label>
        <mat-select formControlName="u_role">
            <mat-option value="">Válasszon jogosultságot</mat-option>
            <!--<mat-option value="admin">admin</mat-option>
            <mat-option value="staff">staff</mat-option>-->
            <mat-option *ngFor="let item of rolelist" [value]="item.roles">
                {{item.roles}}
            </mat-option>
        </mat-select>
        </mat-form-field>
        <div>
            <mat-checkbox formControlName="isactive" class="example-margin">Érvényes</mat-checkbox>
        </div>
        <div>
            <button mat-raised-button type="submit">Frissítés</button>
            <a mat-dialog-close mat-flat-button>Bezárás</a>
        </div>
      </form>

</mat-card-content>
</mat-card>
