<form [formGroup]="form" (ngSubmit)="save()">

  <div mat-dialog-content class="content">

    <!-- KATEGÓRIA -->
    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Kategória</mat-label>
        <input matInput formControlName="cat_name">
      </mat-form-field>
    </div>

    <!-- NÉV -->
    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Név</mat-label>
        <input matInput formControlName="user_name">
      </mat-form-field>
    </div>

    <!-- DÁTUMOK -->
    <div class="row">

      <mat-form-field appearance="outline">
        <mat-label>Kezdet</mat-label>
        <input matInput formControlName="serv_start">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Vég</mat-label>
        <input matInput formControlName="serv_end">
      </mat-form-field>

    </div>

    <!-- ÁR -->
    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Ár</mat-label>
        <input matInput type="number" formControlName="cost">
      </mat-form-field>
    </div>

  </div>

  <!-- BUTTON -->
  <div mat-dialog-actions>
    <button mat-raised-button  type="submit">
      Mentés
    </button>

  </div>

</form>
